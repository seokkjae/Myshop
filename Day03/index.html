<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모닝브루 | 예약 관리</title>
  <meta name="description" content="망원동 동네 카페 모닝브루의 예약 관리 페이지. 이름·연락처·픽업 시간·인원수를 입력해 예약을 추가하고 관리합니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf6f0;
      --card: #ffffff;
      --ink: #3a312a;
      --ink-soft: #6b5d52;
      --accent: #c0703a;     /* 따뜻한 커피 브라운/오렌지 */
      --accent-dark: #a85a28;
      --line: #ece2d6;
      --danger: #b4452f;
      --shadow: 0 8px 28px rgba(95, 72, 50, 0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 60px;
    }

    .wrap { width: 100%; max-width: 920px; margin: 0 auto; padding: 0 20px; }

    /* ===== Header ===== */
    header {
      background: linear-gradient(160deg, #fff7ee 0%, #f6e7d4 100%);
      text-align: center;
      padding: 56px 20px 44px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 36px;
    }
    header .badge {
      display: inline-block;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--accent-dark);
      background: #fff;
      border: 1px solid var(--line);
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    header h1 {
      font-family: 'Gowun Batang', serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    header p { color: var(--ink-soft); font-size: 0.98rem; }

    /* ===== Layout: form + list ===== */
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 26px 22px;
    }

    .card h2 {
      font-family: 'Gowun Batang', serif;
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    .card .sub { color: var(--ink-soft); font-size: 0.88rem; margin-bottom: 22px; }

    /* ===== Form ===== */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      font-family: inherit;
      font-size: 1rem;
      color: var(--ink);
      background: #fdfaf6;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192, 112, 58, 0.15);
      background: #fff;
    }

    .btn-add {
      width: 100%;
      font-family: inherit;
      font-size: 1.02rem;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s, transform .05s;
    }
    .btn-add:hover { background: var(--accent-dark); }
    .btn-add:active { transform: translateY(1px); }

    .form-error {
      color: var(--danger);
      font-size: 0.84rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* ===== List ===== */
    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .count-pill {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-dark);
      background: #fbeede;
      border-radius: 999px;
      padding: 3px 12px;
    }

    ul.reservations { list-style: none; display: flex; flex-direction: column; gap: 12px; }

    .res-item {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fffdfa;
    }
    .res-info { flex: 1; min-width: 0; }
    .res-name {
      font-weight: 700;
      font-size: 1.02rem;
      margin-bottom: 2px;
    }
    .res-name .people {
      font-weight: 500;
      font-size: 0.84rem;
      color: var(--accent-dark);
      margin-left: 6px;
    }
    .res-meta {
      font-size: 0.86rem;
      color: var(--ink-soft);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
    }
    .res-meta span { white-space: nowrap; }

    .btn-del {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--danger);
      background: #fff;
      border: 1px solid #eccfc7;
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-del:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ===== Empty state ===== */
    .empty {
      text-align: center;
      padding: 44px 20px;
      color: var(--ink-soft);
    }
    .empty .icon { font-size: 2.4rem; margin-bottom: 12px; }
    .empty p { font-size: 0.96rem; }

    /* ===== Desktop ===== */
    @media (min-width: 760px) {
      header h1 { font-size: 2.6rem; }
      .layout {
        grid-template-columns: 360px 1fr;
        gap: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <span class="badge">MORNING BREW · 예약 관리</span>
    <h1>모닝브루 예약 관리</h1>
    <p>망원동 골목 끝, 오늘의 픽업 예약을 한눈에 관리하세요.</p>
  </header>

  <div class="wrap">
    <div class="layout">
      <!-- ===== 예약 입력 폼 ===== -->
      <section class="card" aria-labelledby="form-title">
        <h2 id="form-title">새 예약 추가</h2>
        <p class="sub">손님 정보를 입력하고 예약을 등록하세요.</p>

        <form id="reservation-form" novalidate>
          <div class="field">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="예: 김모닝" autocomplete="name" />
          </div>
          <div class="field">
            <label for="phone">연락처</label>
            <input type="tel" id="phone" name="phone" placeholder="예: 010-1234-5678" autocomplete="tel" />
          </div>
          <div class="field">
            <label for="pickup">픽업 시간</label>
            <input type="time" id="pickup" name="pickup" />
          </div>
          <div class="field">
            <label for="people">인원수</label>
            <input type="number" id="people" name="people" min="1" step="1" placeholder="예: 2" inputmode="numeric" />
          </div>
          <button type="submit" class="btn-add">＋ 예약 추가</button>
          <p class="form-error" id="form-error" role="alert"></p>
        </form>
      </section>

      <!-- ===== 예약 목록 ===== -->
      <section class="card" aria-labelledby="list-title">
        <div class="list-head">
          <h2 id="list-title">예약 목록</h2>
          <span class="count-pill" id="count-pill">0건</span>
        </div>
        <ul class="reservations" id="reservation-list"></ul>
      </section>
    </div>
  </div>

  <script>
    // 데이터는 지금은 메모리 배열에만 임시 저장 (내일 localStorage로 영구 저장 예정)
    let reservations = [];
    let nextId = 1;

    const form = document.getElementById('reservation-form');
    const listEl = document.getElementById('reservation-list');
    const countPill = document.getElementById('count-pill');
    const errorEl = document.getElementById('form-error');

    const fields = {
      name: document.getElementById('name'),
      phone: document.getElementById('phone'),
      pickup: document.getElementById('pickup'),
      people: document.getElementById('people'),
    };

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function render() {
      countPill.textContent = reservations.length + '건';

      if (reservations.length === 0) {
        listEl.innerHTML =
          '<li class="empty">' +
          '<div class="icon">☕</div>' +
          '<p>아직 예약이 없습니다. 첫 예약을 추가해 보세요!</p>' +
          '</li>';
        return;
      }

      listEl.innerHTML = reservations.map(function (r) {
        return '' +
          '<li class="res-item" data-id="' + r.id + '">' +
            '<div class="res-info">' +
              '<div class="res-name">' + escapeHtml(r.name) +
                '<span class="people">' + escapeHtml(r.people) + '명</span>' +
              '</div>' +
              '<div class="res-meta">' +
                '<span>🕒 ' + escapeHtml(r.pickup) + '</span>' +
                '<span>📞 ' + escapeHtml(r.phone) + '</span>' +
              '</div>' +
            '</div>' +
            '<button type="button" class="btn-del" data-id="' + r.id + '">삭제</button>' +
          '</li>';
      }).join('');
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const name = fields.name.value.trim();
      const phone = fields.phone.value.trim();
      const pickup = fields.pickup.value;
      const people = fields.people.value.trim();

      if (!name || !phone || !pickup || !people) {
        errorEl.textContent = '모든 칸을 입력해 주세요.';
        return;
      }
      if (Number(people) < 1) {
        errorEl.textContent = '인원수는 1명 이상이어야 합니다.';
        return;
      }
      errorEl.textContent = '';

      reservations.push({ id: nextId++, name: name, phone: phone, pickup: pickup, people: people });
      render();
      form.reset();
      fields.name.focus();
    });

    // 삭제 버튼: 이벤트 위임으로 해당 항목만 제거
    listEl.addEventListener('click', function (e) {
      const btn = e.target.closest('.btn-del');
      if (!btn) return;
      const id = Number(btn.getAttribute('data-id'));
      reservations = reservations.filter(function (r) { return r.id !== id; });
      render();
    });

    render();
  </script>
</body>
</html>
