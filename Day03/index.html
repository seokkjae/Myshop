<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모닝브루 | 예약 관리</title>
  <meta name="description" content="망원동 동네 카페 모닝브루의 예약 관리 페이지. 이름·연락처·픽업 시간·인원수를 입력해 예약을 추가하고 관리합니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf6f0;
      --card: #ffffff;
      --ink: #3a312a;
      --ink-soft: #6b5d52;
      --accent: #c0703a;     /* 따뜻한 커피 브라운/오렌지 */
      --accent-dark: #a85a28;
      --line: #ece2d6;
      --danger: #b4452f;
      --shadow: 0 8px 28px rgba(95, 72, 50, 0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 60px;
    }

    .wrap { width: 100%; max-width: 920px; margin: 0 auto; padding: 0 20px; }

    /* ===== Header ===== */
    header {
      background: linear-gradient(160deg, #fff7ee 0%, #f6e7d4 100%);
      text-align: center;
      padding: 56px 20px 44px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 36px;
    }
    header .badge {
      display: inline-block;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--accent-dark);
      background: #fff;
      border: 1px solid var(--line);
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    header h1 {
      font-family: 'Gowun Batang', serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    header p { color: var(--ink-soft); font-size: 0.98rem; }

    /* ===== Layout: form + list ===== */
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 26px 22px;
    }

    .card h2 {
      font-family: 'Gowun Batang', serif;
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    .card .sub { color: var(--ink-soft); font-size: 0.88rem; margin-bottom: 22px; }

    /* ===== Form ===== */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      font-family: inherit;
      font-size: 1rem;
      color: var(--ink);
      background: #fdfaf6;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192, 112, 58, 0.15);
      background: #fff;
    }
    /* 유효성 에러: 빨간 테두리 + 빨간 안내 문구 */
    .field.invalid input {
      border-color: var(--danger);
      background: #fff7f5;
    }
    .field.invalid input:focus {
      box-shadow: 0 0 0 3px rgba(180, 69, 47, 0.15);
    }
    .field-error {
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 5px;
      min-height: 1em;
    }

    .btn-add {
      width: 100%;
      font-family: inherit;
      font-size: 1.02rem;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s, transform .05s;
    }
    .btn-add:hover { background: var(--accent-dark); }
    .btn-add:active { transform: translateY(1px); }
    .btn-add:disabled {
      background: #d9b89c;
      cursor: default;
      transform: none;
    }

    /* 상단 초록 토스트 안내 */
    .toast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translate(-50%, -20px);
      z-index: 50;
      background: #2f7d4f;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 12px 22px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(47, 125, 79, 0.32);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    /* ===== List ===== */
    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .count-pill {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-dark);
      background: #fbeede;
      border-radius: 999px;
      padding: 3px 12px;
    }

    ul.reservations { list-style: none; display: flex; flex-direction: column; gap: 12px; }

    .res-item {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fffdfa;
    }
    .res-info { flex: 1; min-width: 0; }
    .res-name {
      font-weight: 700;
      font-size: 1.02rem;
      margin-bottom: 2px;
    }
    .res-name .people {
      font-weight: 500;
      font-size: 0.84rem;
      color: var(--accent-dark);
      margin-left: 6px;
    }
    .res-meta {
      font-size: 0.86rem;
      color: var(--ink-soft);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
    }
    .res-meta span { white-space: nowrap; }

    .btn-del {
      flex-shrink: 0;
      font-family: inherit;
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--danger);
      background: #fff;
      border: 1px solid #eccfc7;
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-del:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ===== Empty state ===== */
    .empty {
      text-align: center;
      padding: 44px 20px;
      color: var(--ink-soft);
    }
    .empty .icon { font-size: 2.4rem; margin-bottom: 12px; }
    .empty p { font-size: 0.96rem; }

    /* ===== Desktop ===== */
    @media (min-width: 760px) {
      header h1 { font-size: 2.6rem; }
      .layout {
        grid-template-columns: 360px 1fr;
        gap: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast" role="status" aria-live="polite">예약이 추가되었습니다!</div>

  <header>
    <span class="badge">MORNING BREW · 예약 관리</span>
    <h1>모닝브루 예약 관리</h1>
    <p>망원동 골목 끝, 오늘의 픽업 예약을 한눈에 관리하세요.</p>
  </header>

  <div class="wrap">
    <div class="layout">
      <!-- ===== 예약 입력 폼 ===== -->
      <section class="card" aria-labelledby="form-title">
        <h2 id="form-title">새 예약 추가</h2>
        <p class="sub">손님 정보를 입력하고 예약을 등록하세요.</p>

        <form id="reservation-form" novalidate>
          <div class="field" data-field="name">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="예: 김모닝" autocomplete="name" />
            <p class="field-error"></p>
          </div>
          <div class="field" data-field="phone">
            <label for="phone">연락처</label>
            <input type="tel" id="phone" name="phone" placeholder="예: 010-1234-5678" autocomplete="tel" />
            <p class="field-error"></p>
          </div>
          <div class="field" data-field="pickup">
            <label for="pickup">픽업 시간</label>
            <input type="time" id="pickup" name="pickup" />
            <p class="field-error"></p>
          </div>
          <div class="field" data-field="people">
            <label for="people">인원수</label>
            <input type="number" id="people" name="people" min="1" step="1" placeholder="예: 2" inputmode="numeric" />
            <p class="field-error"></p>
          </div>
          <button type="submit" class="btn-add" id="submit-btn">＋ 예약 추가</button>
        </form>
      </section>

      <!-- ===== 예약 목록 ===== -->
      <section class="card" aria-labelledby="list-title">
        <div class="list-head">
          <h2 id="list-title">예약 목록</h2>
          <span class="count-pill" id="count-pill">0건</span>
        </div>
        <ul class="reservations" id="reservation-list"></ul>
      </section>
    </div>
  </div>

  <script>
    // 데이터는 지금은 메모리 배열에만 임시 저장 (내일 localStorage로 영구 저장 예정)
    let reservations = [];
    let nextId = 1;

    const form = document.getElementById('reservation-form');
    const listEl = document.getElementById('reservation-list');
    const countPill = document.getElementById('count-pill');
    const submitBtn = document.getElementById('submit-btn');
    const toast = document.getElementById('toast');

    const fields = {
      name: document.getElementById('name'),
      phone: document.getElementById('phone'),
      pickup: document.getElementById('pickup'),
      people: document.getElementById('people'),
    };

    // 각 입력의 .field 래퍼와 에러 문구 요소
    function fieldWrap(key) { return document.querySelector('.field[data-field="' + key + '"]'); }
    function fieldErrorEl(key) { return fieldWrap(key).querySelector('.field-error'); }

    function setFieldError(key, message) {
      const wrap = fieldWrap(key);
      fieldErrorEl(key).textContent = message;
      wrap.classList.toggle('invalid', Boolean(message));
    }
    function clearAllErrors() {
      Object.keys(fields).forEach(function (k) { setFieldError(k, ''); });
    }

    let toastTimer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 3000);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function render() {
      countPill.textContent = reservations.length + '건';

      if (reservations.length === 0) {
        listEl.innerHTML =
          '<li class="empty">' +
          '<div class="icon">☕</div>' +
          '<p>아직 예약이 없습니다. 첫 예약을 추가해 보세요!</p>' +
          '</li>';
        return;
      }

      listEl.innerHTML = reservations.map(function (r) {
        return '' +
          '<li class="res-item" data-id="' + r.id + '">' +
            '<div class="res-info">' +
              '<div class="res-name">' + escapeHtml(r.name) +
                '<span class="people">' + escapeHtml(r.people) + '명</span>' +
              '</div>' +
              '<div class="res-meta">' +
                '<span>🕒 ' + escapeHtml(r.pickup) + '</span>' +
                '<span>📞 ' + escapeHtml(r.phone) + '</span>' +
              '</div>' +
            '</div>' +
            '<button type="button" class="btn-del" data-id="' + r.id + '">삭제</button>' +
          '</li>';
      }).join('');
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const values = {
        name: fields.name.value.trim(),
        phone: fields.phone.value.trim(),
        pickup: fields.pickup.value,
        people: fields.people.value.trim(),
      };

      // 1) 빈 칸 검증: 비어 있으면 칸 아래 "필수 항목입니다", 하나라도 비면 제출 중단
      let hasError = false;
      let firstInvalid = null;
      Object.keys(fields).forEach(function (k) {
        if (!values[k]) {
          setFieldError(k, '필수 항목입니다');
          hasError = true;
          if (!firstInvalid) firstInvalid = fields[k];
        } else if (k === 'people' && Number(values.people) < 1) {
          setFieldError(k, '1명 이상 입력해 주세요');
          hasError = true;
          if (!firstInvalid) firstInvalid = fields[k];
        } else {
          setFieldError(k, '');
        }
      });
      if (hasError) {
        if (firstInvalid) firstInvalid.focus();
        return;
      }

      // 2) '저장 중...' 잠깐 표시 후 추가 → 초록 토스트(3초)
      submitBtn.disabled = true;
      submitBtn.textContent = '저장 중...';
      setTimeout(function () {
        reservations.push({
          id: nextId++,
          name: values.name, phone: values.phone,
          pickup: values.pickup, people: values.people,
        });
        render();
        form.reset();
        clearAllErrors();
        submitBtn.disabled = false;
        submitBtn.textContent = '＋ 예약 추가';
        showToast('예약이 추가되었습니다!');
        fields.name.focus();
      }, 600);
    });

    // 입력하면 해당 칸의 에러 즉시 해제
    Object.keys(fields).forEach(function (k) {
      fields[k].addEventListener('input', function () { setFieldError(k, ''); });
    });

    // 삭제 버튼: 이벤트 위임으로 해당 항목만 제거
    listEl.addEventListener('click', function (e) {
      const btn = e.target.closest('.btn-del');
      if (!btn) return;
      // 3) 삭제 전 확인 창
      if (!window.confirm('이 예약을 삭제할까요?')) return;
      const id = Number(btn.getAttribute('data-id'));
      reservations = reservations.filter(function (r) { return r.id !== id; });
      render();
    });

    render();
  </script>
</body>
</html>
